esphome:
  name: kitchen_gas_alarm_${device_id}
  friendly_name: KitchenGasAlarm_${device_id}

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

api:

ota:
  - platform: esphome



# 📊 Analog sensor (MQ-6)
sensor:
  - platform: adc
    pin: A0
    name: "MQ6 Gas Level"
    id: gas_sensor
    update_interval: 1s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5

# 🎚️ Threshold slider (Home Assistant)
number:
  - platform: template
    name: "Gas Threshold"
    id: gas_threshold
    min_value: 0.0
    max_value: 3.0
    step: 0.05
    initial_value: 0.8
    restore_value: true
    optimistic: true

# 🚨 Alarm state (latched)
globals:
  - id: alarm_active
    type: bool
    restore_value: no
    initial_value: 'false'

# 🔊 Buzzer output
output:
  - platform: gpio
    pin: D5
    id: buzzer_out

switch:
  - platform: output
    name: "Buzzer"
    id: buzzer
    output: buzzer_out

# 🔘 Physical reset button
binary_sensor:
  - platform: gpio
    pin:
      number: D6
      mode: INPUT_PULLUP
      inverted: true
    name: "Reset Button"
    on_press:
      then:
        - lambda: |-
            id(alarm_active) = false;
        - switch.turn_off: buzzer

# 🚨 Gas detection logic (latching)
interval:
  - interval: 1s
    then:
      - lambda: |-
          if (id(gas_sensor).state > id(gas_threshold).state) {
            id(alarm_active) = true;
          }

      - if:
          condition:
            lambda: 'return id(alarm_active);'
          then:
            - switch.turn_on: buzzer
          else:
            - switch.turn_off: buzzer