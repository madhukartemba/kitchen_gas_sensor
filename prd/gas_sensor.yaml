substitutions:
  device_id: "0"

esphome:
  name: kitchen-gas-alarm-${device_id}
  friendly_name: Kitchen Gas Alarm ${device_id}
  # Include your custom C++ header
  includes:
    - SensorProcessor.h
  on_boot:
  # --- HARDWARE TEST ---
    - priority: 600
      then:
        - switch.turn_on: buzzer
        - light.turn_on:
            id: status_led
            red: 100%
            green: 100%
            blue: 100%
            brightness: 50%
            effect: "None"
        - delay: 1s
        - switch.turn_off: buzzer
        - light.turn_off: status_led
        - lambda: 'id(self_test_done) = true;'
    - priority: -10
      then:
        - lambda: |-
            get_processor()->setAbsoluteThreshold(id(gas_threshold).state);
            get_processor()->setRelativeThreshold(id(gas_rel_threshold).state);
            get_processor()->setNumberOfReadings(static_cast<int>(id(gas_reading_count).state));
            get_processor()->setWarmupTimeMs(static_cast<unsigned long>(id(gas_warmup_seconds).state * 1000.0f));
            get_processor()->setCooldownTimeMs(static_cast<unsigned long>(id(gas_cooldown_seconds).state * 1000.0f));
            get_processor()->setFaultVolts(id(gas_fault_trip_volts).state);
            get_processor()->setFaultClearVolts(id(gas_fault_clear_volts).state);

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

api:

ota:
  - platform: esphome

# 🚩 Track if the startup test has finished
globals:
  - id: self_test_done
    type: bool
    initial_value: 'false'

# 1. Analog Gas Sensor - Exposed to HA
sensor:
  - platform: adc
    pin: GPIO0
    name: "Gas Level"
    id: gas_sensor
    # Read the physical pin very fast (5 times a second)
    update_interval: 200ms 
    attenuation: 12db
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5

# 3. Sensor State - Exposed to HA
text_sensor:
  - platform: template
    name: "Gas Sensor State"
    id: sensor_state
    update_interval: 1s
    lambda: |-
      switch (get_processor()->getState()) {
        case WARMUP: return std::string("Warmup");
        case NORMAL: return std::string("Normal");
        case ALARM: return std::string("Alarm");
        case COOLDOWN: return std::string("Cooldown");
        case ERROR: return std::string("Error");
      }
      return std::string("Unknown");

# Threshold slider (Home Assistant)
number:
  - platform: template
    name: "Gas Absolute Threshold"
    id: gas_threshold
    min_value: 0.0
    max_value: 3.3
    unit_of_measurement: "V"
    step: 0.01
    initial_value: 1.5
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: "get_processor()->setAbsoluteThreshold(x);"

  - platform: template
    name: "Gas Relative Threshold"
    id: gas_rel_threshold
    min_value: 0.0
    max_value: 3.3
    unit_of_measurement: "V"
    step: 0.01
    initial_value: 0.3
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: "get_processor()->setRelativeThreshold(x);"

  - platform: template
    name: "Gas reading count"
    id: gas_reading_count
    min_value: 1
    max_value: 3600
    step: 1
    initial_value: 300
    restore_value: true
    optimistic: true
    mode: box
    on_value:
      then:
        - lambda: "get_processor()->setNumberOfReadings(static_cast<int>(x));"

  - platform: template
    name: "Gas warmup duration"
    id: gas_warmup_seconds
    unit_of_measurement: "s"
    min_value: 0
    max_value: 600
    step: 1
    initial_value: 60
    restore_value: true
    optimistic: true
    mode: box
    on_value:
      then:
        - lambda: "get_processor()->setWarmupTimeMs(static_cast<unsigned long>(x * 1000.0f));"

  - platform: template
    name: "Gas cooldown duration"
    id: gas_cooldown_seconds
    unit_of_measurement: "s"
    min_value: 0
    max_value: 600
    step: 1
    initial_value: 30
    restore_value: true
    optimistic: true
    mode: box
    on_value:
      then:
        - lambda: "get_processor()->setCooldownTimeMs(static_cast<unsigned long>(x * 1000.0f));"

  - platform: template
    name: "Gas fault trip voltage"
    id: gas_fault_trip_volts
    unit_of_measurement: "V"
    min_value: 0.0
    max_value: 0.5
    step: 0.001
    initial_value: 0.02
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: "get_processor()->setFaultVolts(x);"

  - platform: template
    name: "Gas fault clear voltage"
    id: gas_fault_clear_volts
    unit_of_measurement: "V"
    min_value: 0.0
    max_value: 0.5
    step: 0.001
    initial_value: 0.05
    restore_value: true
    optimistic: true
    on_value:
      then:
        - lambda: "get_processor()->setFaultClearVolts(x);"

# 🔊 Buzzer (Internal only)
output:
  - platform: gpio
    pin: GPIO4
    id: buzzer_out

switch:
  - platform: output
    name: "Buzzer"
    id: buzzer
    output: buzzer_out
    internal: true # Hides from Home Assistant

script:
  - id: alarm_beep_loop
    mode: restart
    then:
      - while:
          condition:
            lambda: |-
              return get_processor()->getState() == ALARM;
          then:
            - switch.turn_on: buzzer
            - delay: 250ms
            - switch.turn_off: buzzer
            - delay: 550ms

  - id: error_beep_loop
    mode: restart
    then:
      - while:
          condition:
            lambda: |-
              return get_processor()->getState() == ERROR;
          then:
            - switch.turn_on: buzzer
            - delay: 120ms
            - switch.turn_off: buzzer
            - delay: 5s


# Virtual reset button - Exposed to HA
button:
  - platform: template
    name: "Reset Alarm"
    id: reset_button_virtual
    on_press:
      then:
        - script.stop: alarm_beep_loop
        - lambda: 'get_processor()->resetAlarm(millis());'

# 🔘 Physical reset button
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      mode: ${ "INPUT_PULLUP" if device_id == "0" else "INPUT" }
      inverted: ${ device_id == "0" }
    name: "Reset Button Physical"
    id: reset_button_phys
    internal: true # Hide the raw button presses from HA
    filters:
      - delayed_on: 10ms # Debounce
    on_press:
      then:
        - if:
            condition:
              lambda: |-
                return get_processor()->getState() != ALARM;
            then:
              - switch.turn_on: buzzer
              - delay: 60ms
              - switch.turn_off: buzzer
        # Wait 1 second to verify if it's a long press
        - delay: 1s
        - if:
            condition:
              binary_sensor.is_on: reset_button_phys
            then:
              - script.stop: alarm_beep_loop
              - lambda: 'get_processor()->resetAlarm(millis());'
              - switch.turn_off: buzzer
              - delay: 15ms
              - switch.turn_on: buzzer
              - delay: 35ms
              - switch.turn_off: buzzer
              - delay: 22ms
              - switch.turn_on: buzzer
              - delay: 35ms
              - switch.turn_off: buzzer
              - logger.log: "Alarm reset via long press"
  # --- Native Home Assistant Gas Alarm ---
  - platform: template
    name: "Gas Leak Detected"
    id: gas_leak_alarm
    device_class: gas
    lambda: |-
      return get_processor()->getState() == ALARM;

  # --- Native Home Assistant Hardware Error Alert ---
  - platform: template
    name: "Gas Sensor Fault"
    id: gas_sensor_fault
    device_class: problem
    lambda: |-
      return get_processor()->getState() == ERROR;


# 🌈 NeoPixel (Internal only)
light:
  - platform: esp32_rmt_led_strip
    pin: GPIO5
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
    name: "Status LED"
    id: status_led
    internal: true
    default_transition_length: 0s
    gamma_correct: 1.0
    effects:
      - pulse:
          name: "Breathe"
          transition_length: 1s
          update_interval: 1s  
          min_brightness: 35%
          max_brightness: 100%
      - lambda:
          name: "Status Pulse"
          update_interval: 50ms
          lambda: |-
            static uint32_t cycle_start_ms = 0;
            if (initial_run) {
              cycle_start_ms = millis();
            }
            constexpr uint32_t k_hold_ms = 6000;
            constexpr uint32_t k_blink_ms = 150;
            constexpr uint32_t k_period_ms = k_hold_ms + k_blink_ms;
            const uint32_t t = (millis() - cycle_start_ms) % k_period_ms;
            const float br = (t < k_hold_ms) ? 0.10f : 0.20f;
            auto call = id(status_led).turn_on();
            call.set_transition_length(0);
            call.set_rgb(0.0f, 1.0f, 0.0f);
            call.set_brightness(br);
            call.set_publish(false);
            call.set_save(false);
            call.perform();
      - strobe:
          name: "Alarm Flash"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
              transition_length: 80ms
            - state: true
              brightness: 15%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
              transition_length: 80ms
      - lambda:
          name: "Fault Signal"
          update_interval: 50ms
          lambda: |-
            static uint32_t cycle_start_ms = 0;
            if (initial_run) {
              cycle_start_ms = millis();
            }
            // Triple red flash, then long off — distinct from alarm strobe / normal pulse
            constexpr uint32_t k_period_ms = 2500;
            constexpr uint32_t on1 = 100;
            constexpr uint32_t gap1 = 250;
            constexpr uint32_t on2 = 350;
            constexpr uint32_t gap2 = 500;
            constexpr uint32_t on3 = 600;
            const uint32_t t = (millis() - cycle_start_ms) % k_period_ms;
            const bool lit = (t < on1) || (t >= gap1 && t < on2) || (t >= gap2 && t < on3);
            auto call = id(status_led).turn_on();
            call.set_transition_length(0);
            call.set_rgb(1.0f, 0.0f, 0.0f);
            call.set_brightness(lit ? 1.0f : 0.0f);
            call.set_publish(false);
            call.set_save(false);
            call.perform();


# 🚨 Primary Engine Logic
interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(self_test_done);'
          then:
            - lambda: |-
                get_processor()->update(id(gas_sensor).state, millis());
            
            - logger.log:
                tag: gasSensorProcessor
                format: "state=%s reading=%.3f relativeReading=%.3f"
                args:
                  - "sensorStateStr(get_processor()->getState())"
                  - "id(gas_sensor).state"
                  - "get_processor()->getRelativeReading()"
            
            - lambda: |-
                SensorState current_state = get_processor()->getState();
                
                static SensorState previous_state = ERROR;
                static bool first_run = true;

                if (current_state != previous_state || first_run) {
                  first_run = false;
                  previous_state = current_state;

                  if (current_state == ALARM) {
                    id(error_beep_loop).stop();
                    id(alarm_beep_loop).execute();
                    auto call = id(status_led).turn_on();
                    call.set_effect("Alarm Flash");
                    call.perform();
                    
                  } else if (current_state == WARMUP) {
                    id(error_beep_loop).stop();
                    id(alarm_beep_loop).stop();
                    id(buzzer).turn_off();
                    auto call = id(status_led).turn_on();
                    call.set_rgb(1.0, 0.5, 0.0); // Orange
                    call.set_brightness(1.0);
                    call.set_transition_length(1000); 
                    call.set_effect("Breathe");       
                    call.perform();
                    
                  } else if (current_state == ERROR) {
                    id(alarm_beep_loop).stop();
                    id(buzzer).turn_off();
                    id(error_beep_loop).execute();
                    auto call = id(status_led).turn_on();
                    call.set_rgb(1.0, 0.0, 0.0);
                    call.set_brightness(1.0);
                    call.set_transition_length(0);
                    call.set_effect("Fault Signal");
                    call.perform();

                  } else if (current_state == COOLDOWN) {
                    id(error_beep_loop).stop();
                    id(alarm_beep_loop).stop();
                    id(buzzer).turn_off();
                    auto call = id(status_led).turn_on();
                    call.set_rgb(0.0, 0.0, 1.0); // Blue
                    call.set_brightness(1.0);
                    call.set_transition_length(1000); 
                    call.set_effect("Breathe");       
                    call.perform();
                    
                  } else { // NORMAL
                    id(error_beep_loop).stop();
                    id(alarm_beep_loop).stop();
                    id(buzzer).turn_off();
                    auto call = id(status_led).turn_on();
                    call.set_rgb(0.0, 1.0, 0.0);
                    call.set_brightness(0.1);
                    call.set_transition_length(0);
                    call.set_effect("Status Pulse");
                    call.perform();
                  }
                }