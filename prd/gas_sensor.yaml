esphome:
  name: kitchen-gas-alarm-${device_id}
  friendly_name: Kitchen Gas Alarm ${device_id}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:

api:

ota:
  - platform: esphome

# 📊 Analog sensor (MQ-6)
sensor:
  - platform: adc
    pin: GPIO0
    name: "MQ6 Gas Level"
    id: gas_sensor
    update_interval: 1s
    attenuation: 12db
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 5

# 🎚️ Threshold slider (Home Assistant)
number:
  - platform: template
    name: "Gas Threshold"
    id: gas_threshold
    min_value: 0.0
    max_value: 3.3
    step: 0.05
    initial_value: 0.8
    restore_value: true
    optimistic: true

# 🚨 Alarm state (latched)
globals:
  - id: alarm_active
    type: bool
    restore_value: no
    initial_value: 'false'

# 🔊 Buzzer output
output:
  - platform: gpio
    pin: GPIO4
    id: buzzer_out

switch:
  - platform: output
    name: "Buzzer"
    id: buzzer
    output: buzzer_out

# 🌈 NeoPixel (ESP-IDF compatible)
light:
  - platform: esp32_rmt_led_strip
    pin: GPIO5
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
    name: "Status LED"
    id: status_led

# 🔘 Physical reset button
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT
      inverted: false
    name: "Reset Button"
    on_press:
      then:
        - lambda: |-
            id(alarm_active) = false;
        - switch.turn_off: buzzer
        - light.turn_off: status_led

# 🚨 Gas detection logic (latching + LED feedback)
interval:
  - interval: 1s
    then:
      - lambda: |-
          if (id(gas_sensor).state > id(gas_threshold).state) {
            id(alarm_active) = true;
          }

      - if:
          condition:
            lambda: 'return id(alarm_active);'
          then:
            - switch.turn_on: buzzer
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 100%
          else:
            - switch.turn_off: buzzer
            - light.turn_on:
                id: status_led
                red: 0%
                green: 100%
                blue: 0%
                brightness: 30%